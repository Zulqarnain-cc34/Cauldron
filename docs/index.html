<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cauldron — Live Docs</title>
  <link rel="stylesheet" href="/docs/docs.css" />
</head>

<body>
  <header class="docs-header">
    <div class="docs-header-main">
      <h1>Cauldron Docs</h1>
      <p class="subtitle">Auto-generated from the registry · every page links to live behavior tests</p>
    </div>
    <div class="docs-stats" id="doc-stats"></div>
    <div class="docs-header-actions">
      <a href="/help/index.html">Help</a>
      <a href="/index.html">← Sim</a>
      <a href="/tests/index.html">Test runner</a>
    </div>
  </header>

  <div class="docs-layout">
    <aside class="docs-sidebar">
      <input type="search" id="doc-search" class="doc-search" placeholder="Search materials, plugins, tests…"
        autocomplete="off" />
      <div class="doc-filters" id="doc-filters">
        <button type="button" class="filter-btn active" data-kind="">All</button>
        <button type="button" class="filter-btn" data-kind="material">Materials</button>
        <button type="button" class="filter-btn" data-kind="plugin">Plugins</button>
        <button type="button" class="filter-btn" data-kind="system">Systems</button>
      </div>
      <p class="doc-list-status" id="list-status"></p>
      <nav id="doc-list" class="doc-list" aria-label="Documentation entries"></nav>
    </aside>

    <main class="docs-main" id="doc-main">
      <p class="docs-empty">Select an entry or search to browse the catalog.</p>
    </main>

    <aside class="docs-demo" id="demo-panel">
      <h2>Live test demo</h2>
      <dl class="demo-meta">
        <div><dt>Test</dt><dd id="demo-test-id">—</dd></div>
        <div><dt>Rules</dt><dd id="demo-rules">—</dd></div>
        <div><dt>Grid</dt><dd id="demo-slice">—</dd></div>
        <div><dt>Viewport</dt><dd id="demo-size">—</dd></div>
        <div><dt>Ticks</dt><dd id="demo-ticks">—</dd></div>
      </dl>
      <p id="demo-status" class="demo-status">Pick a behavior test below</p>
      <div class="demo-canvas-wrap">
        <canvas id="demo-canvas" aria-label="Live test grid"></canvas>
      </div>
      <p id="demo-result" class="demo-result"></p>
      <p id="demo-verify" class="demo-verify"></p>
      <div class="demo-controls">
        <button type="button" id="btn-play">Play</button>
        <button type="button" id="btn-pause">Pause</button>
        <button type="button" id="btn-step">Step</button>
        <button type="button" id="btn-replay">Replay</button>
      </div>
    </aside>
  </div>

  <script type="module" src="/docs/runner.js"></script>
</body>

</html>
